<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TTPlayer Mobile</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TTPlayer">
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #111113;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        .player-container {
            max-width: 380px;
            margin: 40px auto 0 auto;
            background-color: #1a1a1c;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .display-panel {
            background-color: #08080a;
            border: 1px solid #2d2d30;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 12px;
        }
        #track-title {
            color: #00ffcc;
            font-size: 15px;
            font-weight: bold;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .timeline-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 12px;
            color: #8a8a9a;
        }
        .timeline {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #08080a;
            outline: none;
        }
        .timeline::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00ffcc;
            cursor: pointer;
        }
        .playlist-management-bar {
            display: flex;
            background-color: #222226;
            padding: 6px;
            border-radius: 6px;
            margin-bottom: 10px;
            gap: 4px;
            align-items: center;
        }
        .playlist-select {
            flex: 1;
            background-color: #08080a;
            color: #ffffff;
            border: 1px solid #2d2d30;
            padding: 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            outline: none;
            max-width: 110px;
        }
        .mgr-btn {
            background-color: #2d2d30;
            color: #00ffcc;
            border: none;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .mgr-btn.ren { color: #ffffaa; }
        .mgr-btn.del { color: #ff8888; background-color: #3d2222; }
        
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            background-color: #2d2d30;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }
        button:active, .mgr-btn:active {
            background-color: #00ffcc;
            color: #121216;
        }
        .loop-btn.active {
            color: #00ffcc;
            border: 1px solid #00ffcc;
        }
        .file-input-label {
            flex: 1;
            background-color: #2d2d30;
            color: #00ffcc;
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }
        #file-input { display: none; }
        
        .playlist-box {
            background-color: #08080a;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            padding: 5px;
        }
        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #1a1a1c;
            font-size: 13px;
        }
        .track-name {
            cursor: pointer;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }
        .track-item.active .track-name {
            color: #00ffcc;
            font-weight: bold;
        }
        .action-btn-group {
            display: flex;
            gap: 12px;
            flex: none;
            align-items: center;
        }
        .inline-btn {
            background: none;
            border: none;
            padding: 0;
            font-size: 14px;
            cursor: pointer;
        }
        .inline-btn.edit { color: #ffffaa; }
        .inline-btn.del { color: #ff6666; }
        
        #status-msg {
            font-size: 11px;
            text-align: center;
            color: #8a8a9a;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="display-panel">
            <p id="track-title">TTPlayer Mobile | Loading database...</p>
        </div>

        <div class="timeline-container">
            <span id="time-start">00:00</span>
            <input type="range" id="timeline" class="timeline" value="0" min="0" max="100" oninput="seekAudio(this.value)">
            <span id="time-end">00:00</span>
        </div>

        <div class="playlist-management-bar">
            <select id="playlist-select" class="playlist-select" onchange="switchPlaylist(this.value)"></select>
            <button class="mgr-btn" onclick="createNewPlaylist()">+ NEW</button>
            <button class="mgr-btn ren" onclick="renameCurrentPlaylist()">✏️ REN</button>
            <button class="mgr-btn del" onclick="deleteCurrentPlaylist()">✕ DEL</button>
        </div>

        <div class="controls">
            <button id="play-btn" onclick="togglePlay()">▶ PLAY</button>
            <button id="loop-btn" class="loop-btn" onclick="toggleLoop()">🔁 LOOP: OFF</button>
            <label class="file-input-label" for="file-input">+ ADD SONGS</label>
            <input type="file" id="file-input" accept="audio/*" multiple onchange="handleFiles(this.files)">
        </div>

        <div class="playlist-box" id="playlist"></div>
        <div id="status-msg"></div>
    </div>

    <script>
        let db;
        let allPlaylists = { "Main List": [] };
        let currentPlaylistName = "Main List";
        let currentIndex = -1;
        let isLooping = false;
        let activeObjectURLs = []; // Tracks open memory links to clean them up safely
        
        const audioContext = new Audio();
        const timeline = document.getElementById('timeline');
        const timeStart = document.getElementById('time-start');
        const timeEnd = document.getElementById('time-end');
        const playlistSelect = document.getElementById('playlist-select');
        const statusMsg = document.getElementById('status-msg');

        // --- DATABASE INIT ---
        const request = indexedDB.open("TTPlayerDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("appData");
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadDataFromDatabase();
        };

        function saveDataToDatabase() {
            statusMsg.innerText = "Saving changes...";
            const transaction = db.transaction(["appData"], "readwrite");
            const store = transaction.objectStore("appData");
            store.put(allPlaylists, "playlists");
            store.put(currentPlaylistName, "currentPlaylist");
            transaction.oncomplete = () => { statusMsg.innerText = "All changes saved locally."; };
        }

        function loadDataFromDatabase() {
            const transaction = db.transaction(["appData"], "readonly");
            const store = transaction.objectStore("appData");
            
            const reqPlaylists = store.get("playlists");
            reqPlaylists.onsuccess = () => {
                if (reqPlaylists.result) allPlaylists = reqPlaylists.result;
                
                const reqCurrent = store.get("currentPlaylist");
                reqCurrent.onsuccess = () => {
                    if (reqCurrent.result && allPlaylists[reqCurrent.result]) {
                        currentPlaylistName = reqCurrent.result;
                    }
                    rebuildDropdownOptions(currentPlaylistName);
                    document.getElementById('track-title').innerText = "TTPlayer Mobile | Ready";
                    refreshPlaylistTracks();
                };
            };
        }

        // --- FILE HANDLING ---
        function handleFiles(files) {
            statusMsg.innerText = "Processing files...";
            let loadedCount = 0;

            for (let file of files) {
                const reader = new FileReader();
                reader.readAsArrayBuffer(file);
                reader.onload = function(e) {
                    const blob = new Blob([e.target.result], { type: file.type });
                    allPlaylists[currentPlaylistName].push({ name: file.name, fileData: blob });
                    
                    loadedCount++;
                    if (loadedCount === files.length) {
                        saveDataToDatabase();
                        refreshPlaylistTracks();
                        if (currentIndex === -1 && allPlaylists[currentPlaylistName].length > 0) {
                            playTrack(0);
                        }
                    }
                };
            }
        }

        function refreshPlaylistTracks() {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            let activeList = allPlaylists[currentPlaylistName] || [];
            
            activeList.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item' + (index === currentIndex ? ' active' : '');
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'track-name';
                nameSpan.innerText = `${String(index + 1).padStart(2, '0')}. ${track.name}`;
                nameSpan.onclick = () => playTrack(index);
                
                const btnGroup = document.createElement('div');
                btnGroup.className = 'action-btn-group';

                const editBtn = document.createElement('button');
                editBtn.className = 'inline-btn edit';
                editBtn.innerHTML = '✏️';
                editBtn.onclick = (e) => { e.stopPropagation(); renameTrack(index); };

                const delBtn = document.createElement('button');
                delBtn.className = 'inline-btn del';
                delBtn.innerHTML = '✕';
                delBtn.onclick = (e) => { e.stopPropagation(); deleteTrack(index); };
                
                btnGroup.appendChild(editBtn);
                btnGroup.appendChild(delBtn);
                item.appendChild(nameSpan);
                item.appendChild(btnGroup);
                container.appendChild(item);
            });
        }

        // --- PLAYBACK ---
        function playTrack(index) {
            let activeList = allPlaylists[currentPlaylistName] || [];
            if (index < 0 || index >= activeList.length) return;
            
            currentIndex = index;
            
            // Clean up old active object URLs to prevent phone memory leaks
            activeObjectURLs.forEach(url => URL.revokeObjectURL(url));
            activeObjectURLs = [];

            const blobURL = URL.createObjectURL(activeList[currentIndex].fileData);
            activeObjectURLs.push(blobURL);

            audioContext.src = blobURL;
            audioContext.play().catch(() => {
                document.getElementById('play-btn').innerText = '▶ PLAY';
            });
            
            document.getElementById('track-title').innerText = activeList[currentIndex].name;
            document.getElementById('play-btn').innerText = '⏸ PAUSE';
            refreshPlaylistTracks();
        }

        function togglePlay() {
            let activeList = allPlaylists[currentPlaylistName] || [];
            if (activeList.length === 0) return;
            if (currentIndex === -1) { playTrack(0); return; }
            
            if (audioContext.paused) {
                audioContext.play();
                document.getElementById('play-btn').innerText = '⏸ PAUSE';
            } else {
                audioContext.pause();
                document.getElementById('play-btn').innerText = '▶ PLAY';
            }
        }

        // --- MANAGEMENT ENGINE ---
        function createNewPlaylist() {
            let name = prompt("Enter new list name:");
            if (name && name.trim()) {
                name = name.trim();
                if (allPlaylists[name]) { alert("A playlist with that name already exists!"); return; }
                allPlaylists[name] = [];
                rebuildDropdownOptions(name);
                switchPlaylist(name);
                saveDataToDatabase();
            }
        }

        function renameCurrentPlaylist() {
            if (currentPlaylistName === "Main List") { alert("Cannot rename the Main List!"); return; }
            let oldName = currentPlaylistName;
            let newName = prompt(`Enter new name for '${oldName}':`, oldName);
            if (newName && newName.trim()) {
                newName = newName.trim();
                if (newName === oldName) return;
                if (allPlaylists[newName]) { alert("Playlist name already exists!"); return; }
                
                allPlaylists[newName] = allPlaylists[oldName];
                delete allPlaylists[oldName];
                
                rebuildDropdownOptions(newName);
                currentPlaylistName = newName;
                refreshPlaylistTracks();
                saveDataToDatabase();
            }
        }

        function deleteCurrentPlaylist() {
            if (currentPlaylistName === "Main List") { alert("Cannot delete the Main List!"); return; }
            if (confirm(`Delete '${currentPlaylistName}' permanently?`)) {
                cleanPlaybackState();
                delete allPlaylists[currentPlaylistName];
                rebuildDropdownOptions("Main List");
                switchPlaylist("Main List");
                saveDataToDatabase();
            }
        }

        function rebuildDropdownOptions(activeSelection) {
            playlistSelect.innerHTML = '';
            Object.keys(allPlaylists).forEach(name => {
                let option = document.createElement('option');
                option.value = name;
                option.innerText = name.toUpperCase();
                playlistSelect.appendChild(option);
            });
            playlistSelect.value = activeSelection;
        }

        function switchPlaylist(name) {
            currentPlaylistName = name;
            cleanPlaybackState();
            refreshPlaylistTracks();
            saveDataToDatabase();
        }

        function renameTrack(index) {
            let activeList = allPlaylists[currentPlaylistName] || [];
            let newName = prompt("Enter new title:", activeList[index].name);
            if (newName && newName.trim()) {
                activeList[index].name = newName.trim();
                if (index === currentIndex) {
                    document.getElementById('track-title').innerText = activeList[index].name;
                }
                refreshPlaylistTracks();
                saveDataToDatabase();
            }
        }

        function deleteTrack(index) {
            let activeList = allPlaylists[currentPlaylistName] || [];
            activeList.splice(index, 1);
            if (index === currentIndex) {
                cleanPlaybackState();
            } else if (index < currentIndex) {
                currentIndex--;
            }
            refreshPlaylistTracks();
            saveDataToDatabase();
        }

        function cleanPlaybackState() {
            audioContext.pause();
            audioContext.src = '';
            currentIndex = -1;
            document.getElementById('track-title').innerText = "TTPlayer Mobile | Ready";
            document.getElementById('play-btn').innerText = '▶ PLAY';
            resetTimeline();
        }

        function toggleLoop() {
            isLooping = !isLooping;
            audioContext.loop = isLooping;
            const btn = document.getElementById('loop-btn');
            if (isLooping) {
                btn.innerText = '🔁 LOOP: ON';
                btn.classList.add('active');
            } else {
                btn.innerText = '🔁 LOOP: OFF';
                btn.classList.remove('active');
            }
        }

        function seekAudio(value) { if (!isNaN(audioContext.duration)) audioContext.currentTime = value; }
        function formatTime(secs) {
            if (isNaN(secs)) return "00:00";
            let m = Math.floor(secs / 60); let s = Math.floor(secs % 60);
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }
        function resetTimeline() { timeline.value = 0; timeStart.innerText = "00:00"; timeEnd.innerText = "00:00"; }

        audioContext.onloadedmetadata = function() {
            timeline.max = audioContext.duration;
            timeEnd.innerText = formatTime(audioContext.duration);
        };
        audioContext.ontimeupdate = function() {
            if (!isNaN(audioContext.currentTime)) {
                timeline.value = audioContext.currentTime;
                timeStart.innerText = formatTime(audioContext.currentTime);
            }
        };
        audioContext.onended = function() {
            let activeList = allPlaylists[currentPlaylistName] || [];
            if (!isLooping) {
                if (currentIndex + 1 < activeList.length) playTrack(currentIndex + 1);
                else playTrack(0);
            }
        };
    </script>
</body>
</html>
