<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTPlayer Mobile Offline</title>
    <style>
        body {
            background-color: #111113;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-container {
            width: 100%;
            max-width: 400px;
            background-color: #1a1a1c;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            position: relative;
        }

        /* TOP BAR WITH CLOSE BUTTON */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .app-brand {
            font-size: 12px;
            color: #8a8a9a;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .close-btn {
            background-color: #ff3b30;
            color: white;
            border: none;
            border-radius: 4px;
            width: 24px;
            height: 24px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:active {
            background-color: #cc2d24;
        }

        .track-display {
            background-color: #08080a;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
            border: 1px solid #222226;
        }

        #track-title {
            color: #00ffcc;
            font-weight: bold;
            font-size: 14px;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .timeline-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .time-label {
            color: #8a8a9a;
            font-size: 11px;
            width: 40px;
        }

        #time-start { text-align: left; }
        #time-end { text-align: right; }

        #timeline {
            flex-grow: 1;
            margin: 0 8px;
            accent-color: #00ffcc;
            height: 6px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn {
            background-color: #2d2d30;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }

        .btn:active {
            background-color: #00ffcc;
            color: #121216;
        }

        #loop-btn.active {
            color: #00ffcc;
            border: 1px solid #00ffcc;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222226;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .playlist-title {
            font-size: 13px;
            font-weight: bold;
            color: #8a8a9a;
            margin: 0;
        }

        #file-input { display: none; }

        .add-btn {
            background: none;
            border: none;
            color: #00ffcc;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            padding: 0;
        }

        .track-list {
            max-height: 220px;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .track-item {
            background-color: #08080a;
            padding: 12px;
            margin-bottom: 6px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .track-item.active {
            border-left: 3px solid #00ffcc;
            color: #00ffcc;
        }

        .track-name {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
        }

        .remove-btn {
            color: #ff6666;
            background: none;
            border: none;
            font-weight: bold;
            font-size: 14px;
            padding: 4px 8px;
        }
    </style>
</head>
<body>

    <div class="player-container" id="player">
        <div class="top-bar">
            <span class="app-brand">TTPLAYER // MOBILE</span>
            <button class="close-btn" onclick="exitApp()">✕</button>
        </div>

        <div class="track-display">
            <p id="track-title">Offline Audio Ready</p>
        </div>

        <audio id="audio-engine"></audio>

        <div class="timeline-container">
            <span class="time-label" id="time-start">00:00</span>
            <input type="range" id="timeline" min="0" max="100" value="0">
            <span class="time-label" id="time-end">00:00</span>
        </div>

        <div class="controls">
            <button class="btn" id="play-btn">▶ PLAY</button>
            <button class="btn" id="loop-btn">🔁 LOOP: OFF</button>
        </div>

        <div class="playlist-header">
            <h3 class="playlist-title">LIST: MAIN LIST</h3>
            <button class="add-btn" onclick="document.getElementById('file-input').click()">+</button>
            <input type="file" id="file-input" accept="audio/x-m4a, audio/m4a, video/mp4" multiple>
        </div>

        <ul class="track-list" id="track-list-ui"></ul>
    </div>

    <script>
        const audio = document.getElementById('audio-engine');
        const playBtn = document.getElementById('play-btn');
        const loopBtn = document.getElementById('loop-btn');
        const timeline = document.getElementById('timeline');
        const timeStart = document.getElementById('time-start');
        const timeEnd = document.getElementById('time-end');
        const trackTitle = document.getElementById('track-title');
        const fileInput = document.getElementById('file-input');
        const trackListUi = document.getElementById('track-list-ui');

        let playlist = [];
        let currentIndex = -1;
        let isLooping = false;

        fileInput.addEventListener('change', (e) => {
            for (let file of e.target.files) {
                playlist.push({ name: file.name, url: URL.createObjectURL(file) });
            }
            renderPlaylist();
        });

        function renderPlaylist() {
            trackListUi.innerHTML = '';
            playlist.forEach((track, index) => {
                const li = document.createElement('li');
                li.className = `track-item ${index === currentIndex ? 'active' : ''}`;
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'track-name';
                nameSpan.textContent = `${(index + 1).toString().padStart(2, '0')}. ${track.name}`;
                nameSpan.onclick = () => playTrack(index);

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.textContent = '✕';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    playlist.splice(index, 1);
                    if (currentIndex === index) {
                        audio.pause();
                        currentIndex = -1;
                        trackTitle.textContent = "Offline Audio Ready";
                    } else if (currentIndex > index) { currentIndex--; }
                    renderPlaylist();
                };

                li.appendChild(nameSpan);
                li.appendChild(removeBtn);
                trackListUi.appendChild(li);
            });
        }

        function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            audio.src = playlist[currentIndex].url;
            trackTitle.textContent = playlist[currentIndex].name;
            audio.play();
            playBtn.textContent = "⏸ PAUSE";
            renderPlaylist();
        }

        playBtn.addEventListener('click', () => {
            if (currentIndex === -1 && playlist.length > 0) { playTrack(0); return; }
            if (audio.paused) { audio.play(); playBtn.textContent = "⏸ PAUSE"; } 
            else { audio.pause(); playBtn.textContent = "▶ PLAY"; }
        });

        loopBtn.addEventListener('click', () => {
            isLooping = !isLooping;
            loopBtn.textContent = isLooping ? "🔁 LOOP: ON" : "🔁 LOOP: OFF";
            loopBtn.classList.toggle('active', isLooping);
        });

        audio.addEventListener('ended', () => {
            if (isLooping) { audio.currentTime = 0; audio.play(); } 
            else {
                let nextIndex = currentIndex + 1;
                if (nextIndex >= playlist.length) nextIndex = 0;
                if (playlist.length > 0) playTrack(nextIndex);
            }
        });

        audio.addEventListener('timeupdate', () => {
            if (!isNaN(audio.duration)) {
                timeline.value = (audio.currentTime / audio.duration) * 100;
                timeStart.textContent = formatTime(audio.currentTime);
                timeEnd.textContent = formatTime(audio.duration);
            }
        });

        timeline.addEventListener('input', () => {
            if (!isNaN(audio.duration)) { audio.currentTime = (timeline.value / 100) * audio.duration; }
        });

        function formatTime(secs) {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function exitApp() {
            audio.pause();
            try { window.close(); } catch (e) {}
            document.getElementById('player').innerHTML = '<div style="text-align:center;padding:40px;color:#8a8a9a;">Player Closed.</div>';
        }
    </script>
</body>
</html>
