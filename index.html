<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TTPlayer Mobile</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TTPlayer">
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #111113;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        .player-container {
            max-width: 400px;
            margin: 40px auto 0 auto;
        }
        .display-panel {
            background-color: #08080a;
            border: 1px solid #1a1a1c;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }
        #track-title {
            color: #00ffcc;
            font-size: 16px;
            font-weight: bold;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            background-color: #2d2d30;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            active-background: #00ffcc;
        }
        button:active {
            background-color: #00ffcc;
            color: #121216;
        }
        .file-input-label {
            flex: 1;
            background-color: #2d2d30;
            color: #00ffcc;
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
        #file-input {
            display: none;
        }
        .playlist-box {
            background-color: #08080a;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
        }
        .track-item {
            padding: 12px;
            border-bottom: 1px solid #1a1a1c;
            font-size: 14px;
            cursor: pointer;
        }
        .track-item.active {
            color: #00ffcc;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="display-panel">
            <p id="track-title">TTPlayer Mobile | Ready</p>
        </div>

        <div class="controls">
            <button id="play-btn" onclick="togglePlay()">▶ PLAY</button>
            <label class="file-input-label" for="file-input">+ ADD SONGS</label>
            <input type="file" id="file-input" accept="audio/*" multiple onchange="handleFiles(this.files)">
        </div>

        <div class="playlist-box" id="playlist">
            </div>
    </div>

    <script>
        let playlist = [];
        let currentIndex = -1;
        const audioContext = new Audio();
        
        function handleFiles(files) {
            for (let file of files) {
                const objectURL = URL.createObjectURL(file);
                playlist.push({ name: file.name, url: objectURL });
            }
            refreshPlaylist();
        }

        function refreshPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            playlist.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item' + (index === currentIndex ? ' active' : '');
                item.innerText = `${String(index + 1).padStart(2, '0')}. ${track.name}`;
                item.onclick = () => playTrack(index);
                container.appendChild(item);
            });
        }

        function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            audioContext.src = playlist[currentIndex].url;
            audioContext.play();
            
            document.getElementById('track-title').innerText = playlist[currentIndex].name;
            document.getElementById('play-btn').innerText = '⏸ PAUSE';
            refreshPlaylist();
        }

        function togglePlay() {
            if (playlist.length === 0) return;
            if (currentIndex === -1) {
                playTrack(0);
                return;
            }
            
            if (audioContext.paused) {
                audioContext.play();
                document.getElementById('play-btn').innerText = '⏸ PAUSE';
            } else {
                audioContext.pause();
                document.getElementById('play-btn').innerText = '▶ PLAY';
            }
        }

        // Auto-advance track setup
        audioContext.onended = function() {
            if (currentIndex + 1 < playlist.length) {
                playTrack(currentIndex + 1);
            } else {
                playTrack(0); // loop back to start
            }
        };
    </script>
</body>
</html>
